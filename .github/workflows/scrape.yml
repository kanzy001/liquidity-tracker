name: Daily Liquidity Scrape

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC every day
  workflow_dispatch:        # allows manual trigger from GitHub UI anytime

permissions:
  contents: write           # needed to commit data back to repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history so git log works

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run scrapers
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scraper.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          # Only commit if something actually changed
          git diff --staged --quiet || git commit -m "data: liquidity update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
